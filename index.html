<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Portugal Road Paths + Dots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0b1020;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(16, 24, 40, 0.94);
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      padding: 14px;
      min-width: 300px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #f8fafc;
    }

    .section-title {
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel button {
      display: inline-block;
      margin: 4px 4px 0 0;
      padding: 8px 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: #111827;
      color: #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .panel button:hover {
      background: #1f2937;
    }

    .legend {
      margin-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      padding-top: 10px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      margin: 6px 0;
      font-size: 13px;
    }

    .legend-line {
      width: 18px;
      height: 4px;
      border-radius: 2px;
      margin-right: 8px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .leaflet-popup-content-wrapper {
      background: #111827;
      color: #e5e7eb;
      border-radius: 10px;
    }

    .leaflet-popup-tip {
      background: #111827;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h3>Portugal Road Paths + Dots</h3>

    <div class="section-title">Actions</div>
    <div>
      <button onclick="fitPortugal()">Fit Portugal</button>
      <button onclick="showAll()">Show all</button>
      <button onclick="filterSeverity('warning')">Only warning</button>
      <button onclick="filterSeverity('critical')">Only critical</button>
      <button onclick="randomizeStatuses()">Randomize</button>
    </div>

    <div class="legend">
      <div class="legend-row">
        <span class="legend-line" style="background:#6b7280;"></span>
        <span>Base paths</span>
      </div>
      <div class="legend-row">
        <span class="legend-line" style="background:#f59e0b;"></span>
        <span>Warning path</span>
      </div>
      <div class="legend-row">
        <span class="legend-line" style="background:#dc2626;"></span>
        <span>Critical path</span>
      </div>
      <div class="legend-row">
        <span class="legend-dot" style="background:#f59e0b;"></span>
        <span>Warning dot</span>
      </div>
      <div class="legend-row">
        <span class="legend-dot" style="background:#dc2626;"></span>
        <span>Critical dot</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <script>
    const portugalBounds = L.latLngBounds(
      [36.8, -9.6],
      [42.2, -6.0]
    );

    const map = L.map("map", {
      zoomControl: true,
      minZoom: 6,
      maxBounds: portugalBounds,
      maxBoundsViscosity: 1.0
    }).setView([39.5, -8.0], 7);

    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
      {
        attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
        subdomains: "abcd"
      }
    ).addTo(map);

    const regionFiles = [
      { id: "norte", path: "./data/norte.geojson" },
      { id: "centro", path: "./data/centro.geojson" },
      { id: "lisboa", path: "./data/lisboa.geojson" },
      { id: "alentejo", path: "./data/alentejo.geojson" },
      { id: "algarve", path: "./data/algarve.geojson" }
    ];

    let roadItems = [];
    let currentFilter = "all";

    const basePathLayer = L.layerGroup().addTo(map);
    const alertPathLayer = L.layerGroup().addTo(map);
    const dotLayer = L.layerGroup().addTo(map);

    function fitPortugal() {
      map.fitBounds(portugalBounds, { padding: [20, 20] });
    }

    function ensureStatus(feature) {
      if (!feature.properties) {
        feature.properties = {};
      }

      if (!feature.properties.status) {
        const rnd = Math.random();
        if (rnd < 0.75) {
          feature.properties.status = "ok";
        } else if (rnd < 0.92) {
          feature.properties.status = "warning";
        } else {
          feature.properties.status = "critical";
        }
      }

      return feature;
    }

    function getColor(status) {
      if (status === "ok") return "#32CD32";
      if (status === "warning") return "#f59e0b";
      if (status === "critical") return "#dc2626";
      return "#6b7280";
    }

    function getDotRadius(status) {
      if (status === "critical") return 7;
      if (status === "warning") return 6;
      return 4;
    }

    function getLineMidpoint(feature) {
      const geometry = feature.geometry;
      if (!geometry) return null;

      if (geometry.type === "LineString") {
        const line = turf.lineString(geometry.coordinates);
        const len = turf.length(line, { units: "kilometers" });
        return turf.along(line, len / 2, { units: "kilometers" });
      }

      if (geometry.type === "MultiLineString") {
        let longest = null;
        let longestLen = 0;

        for (const coords of geometry.coordinates) {
          const line = turf.lineString(coords);
          const len = turf.length(line, { units: "kilometers" });

          if (len > longestLen) {
            longestLen = len;
            longest = line;
          }
        }

        if (!longest) return null;
        return turf.along(longest, longestLen / 2, { units: "kilometers" });
      }

      return null;
    }

    function toLeafletLatLngs(geometry) {
      if (geometry.type === "LineString") {
        return geometry.coordinates.map(([lon, lat]) => [lat, lon]);
      }

      if (geometry.type === "MultiLineString") {
        return geometry.coordinates.map(line =>
          line.map(([lon, lat]) => [lat, lon])
        );
      }

      return null;
    }

    function popupHtml(item) {
      return `
        <div style="min-width:220px;">
          <div style="font-weight:bold;margin-bottom:8px;">${item.name}</div>
          <div><strong>Status:</strong> ${item.status}</div>
          <div><strong>Region:</strong> ${item.region}</div>
          <div><strong>Road link:</strong> ${item.id_roadlink || "n/a"}</div>
          <div><strong>Inspire ID:</strong> ${item.inspireid || "n/a"}</div>
          <div><strong>National code:</strong> ${item.nationalroadcode || "n/a"}</div>
          <div><strong>Local code:</strong> ${item.localroadcode || "n/a"}</div>
        </div>
      `;
    }

    function shouldShow(item) {
      return currentFilter === "all" || item.status === currentFilter;
    }

    function drawMap() {
      basePathLayer.clearLayers();
      alertPathLayer.clearLayers();
      dotLayer.clearLayers();

      for (const item of roadItems) {
        if (!shouldShow(item)) continue;

        const popup = popupHtml(item);

        const baseStyle = {
          color: "#6b7280",
          weight: 2,
          opacity: 0.35
        };

        const alertStyle = {
          color: getColor(item.status),
          weight: item.status === "critical" ? 4 : 3,
          opacity: 0.95
        };

        if (item.geometryType === "LineString") {
          L.polyline(item.pathLatLngs, baseStyle)
            .bindPopup(popup)
            .addTo(basePathLayer);

          if (item.status === "warning" || item.status === "critical" || item.status === "ok") {
            L.polyline(item.pathLatLngs, alertStyle)
              .bindPopup(popup)
              .addTo(alertPathLayer);
          }
        }

        if (item.geometryType === "MultiLineString") {
          for (const segment of item.pathLatLngs) {
            L.polyline(segment, baseStyle)
              .bindPopup(popup)
              .addTo(basePathLayer);

            if (item.status === "warning" || item.status === "critical" || item.status === "ok") {
              L.polyline(segment, alertStyle)
                .bindPopup(popup)
                .addTo(alertPathLayer);
            }
          }
        }

        L.circleMarker([item.lat, item.lon], {
          radius: getDotRadius(item.status),
          color: getColor(item.status),
          weight: 1,
          fillColor: getColor(item.status),
          fillOpacity: 0.95
        })
          .bindPopup(popup)
          .addTo(dotLayer);
      }
    }

    function showAll() {
      currentFilter = "all";
      drawMap();
    }

    function filterSeverity(status) {
      currentFilter = status;
      drawMap();
    }

    function randomizeStatuses() {
      for (const item of roadItems) {
        const rnd = Math.random();
        if (rnd < 0.50) {
          item.status = "ok";
        } else if (rnd < 0.92) {
          item.status = "warning";
        } else {
          item.status = "critical";
        }
      }

      drawMap();
    }

    async function loadRegion(region) {
      const response = await fetch(region.path);
      if (!response.ok) {
        throw new Error(`Failed to load ${region.path}: ${response.status}`);
      }

      const data = await response.json();
      if (!data || !Array.isArray(data.features)) {
        throw new Error(`${region.path} is not a valid GeoJSON FeatureCollection`);
      }

      for (const rawFeature of data.features) {
        const feature = ensureStatus(rawFeature);

        if (
          !feature.geometry ||
          (feature.geometry.type !== "LineString" &&
           feature.geometry.type !== "MultiLineString")
        ) {
          continue;
        }

        const midpoint = getLineMidpoint(feature);
        if (!midpoint?.geometry?.coordinates) continue;

        const [lon, lat] = midpoint.geometry.coordinates;
        const props = feature.properties || {};
        const pathLatLngs = toLeafletLatLngs(feature.geometry);

        if (!pathLatLngs) continue;

        roadItems.push({
          region: region.id,
          lat,
          lon,
          status: props.status || "ok",
          geometryType: feature.geometry.type,
          pathLatLngs,
          id_roadlink: props.id_roadlink || null,
          inspireid: props.inspireid || null,
          nationalroadcode: props.nationalroadcode || null,
          localroadcode: props.localroadcode || null,
          name:
            props.geographicalname ||
            props.nationalroadcode ||
            props.localroadcode ||
            props.id_roadlink ||
            "Unknown road"
        });
      }
    }

    async function init() {
      try {
        for (const region of regionFiles) {
          await loadRegion(region);
        }

        fitPortugal();
        drawMap();
      } catch (error) {
        console.error(error);
        alert(error.message);
      }
    }

    init();
  </script>
</body>
</html>
